<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

#loader{

}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

.stars span{

position:absolute;

width:3px;
height:3px;

background:white;

border-radius:50%;

opacity:.7;

animation:skyMove 40s linear infinite;

}

@keyframes skyMove{

0%{transform:translateY(0);}
100%{transform:translateY(-1200px);}

}

/* HERO */

.hero{
position:relative;
text-align:center;
}

/* TYPOGRAPHY */

.hero h2{

font-size:5vw;
letter-spacing:-0.04em;
margin-bottom:5px;
line-height:1.7;

}

.hero h1{

font-size:11vw;
letter-spacing:-0.05em;
font-weight:600;
line-height:0.85;

}

.light{
font-weight:400;
}

.bold{
font-weight:600;
}

/* FOR SALE */

.sale{

background:linear-gradient(90deg,#ffffff,#0d0d0d,#ffffff);

background-size:200% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:gradientMove 6s ease infinite;

}

@keyframes gradientMove{

0%{background-position:0% 50%;}
100%{background-position:200% 50%;}

}

/* GLOBE */

.globe{
display:none;
}

@keyframes spin{

from{
transform:translateY(-50%) rotate(0deg);
}

to{
transform:translateY(-50%) rotate(360deg);
}

}

/* TAGLINE */

.tagline{
margin-top:60px;
font-size:18px;
color:#cbd5e1;
}

/* BUTTONS */

.buttons{

margin-top:35px;

display:flex;
gap:20px;
justify-content:center;

}

.btn{

padding:10px 22px;

border-radius:50px;

text-decoration:none;

font-weight:400;

}

.whatsapp{

background:#c503e7;
color:white;

}

.buy{

border:1px solid white;
color:white;

}

.buy:hover{

background:white;
color:black;

}

/* MOBILE */

@media(max-width:768px){

.hero h2{
font-size:10vw;
line-height:50px;
}

.hero h1{
font-size:16vw;
}

.globe{
width:200px;
height:200px;
}

}


/* MAIN DOMAIN NAME (jiya.xyz) */
.hero h1{
font-family: "Space Grotesk", sans-serif;
font-weight:600;
letter-spacing:-0.03em;
}

/* SUB HEADING */
.hero h2{
font-family: "Poppins", sans-serif;
font-weight:500;
}

/* TAGLINE */
.tagline{
font-family: "Poppins", sans-serif;
font-weight:400;
letter-spacing:0.5px;
}

/* DARK PREMIUM LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0a;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
overflow:hidden;
}

/* GLOW BACKGROUND */

#loader::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,#c503e7 0%,transparent 70%);
filter:blur(120px);
opacity:.4;
animation:pulse 4s ease-in-out infinite;
}

/* GLASS BOX */

.loader-box{
position:relative;
padding:40px 60px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(197,3,231,0.2);
text-align:center;
}

/* LOGO TEXT */

.loader-logo{
font-family:"Space Grotesk",sans-serif;
font-size:42px;
font-weight:600;
letter-spacing:-1px;
color:white;
margin-bottom:25px;

/* GRADIENT TEXT */
background:linear-gradient(90deg,#fff,#c503e7,#fff);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:textMove 3s linear infinite;
}

/* LINE LOADER */

.loader-line{
width:220px;
height:3px;
background:rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
}

.loader-line::before{
content:"";
display:block;
height:100%;
width:40%;
background:linear-gradient(90deg,transparent,#c503e7,transparent);
animation:moveLine 1.5s linear infinite;
}

/* ANIMATIONS */

@keyframes moveLine{
0%{transform:translateX(-100%);}
100%{transform:translateX(250%);}
}

@keyframes textMove{
0%{background-position:0%;}
100%{background-position:200%;}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.2);}
}

/* PAGE FADE */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
background-image:url("/images/background.jpg");
background-size:cover;
background-position:center;
overflow:hidden;

font-family: "Poppins", sans-serif;

/* loader fade */
opacity:0;
transition:opacity .6s ease;
}

body.loaded{
opacity:1;
}
