<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Manrope",sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
background-image:url("/images/background.jpg");
background-size:cover;
background-position:center;
overflow:hidden;
padding:20px;
}

/* STARS */
.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

.stars span{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:.7;
animation:skyMove 40s linear infinite;
}

@keyframes skyMove{
0%{transform:translateY(0);}
100%{transform:translateY(-1200px);}
}

/* HERO */
.hero{
text-align:center;
max-width:900px;
width:100%;
padding:20px;
}

/* TYPOGRAPHY */
.hero h2{
font-size:clamp(18px, 4vw, 42px);
letter-spacing:-0.04em;
margin-bottom:10px;
line-height:1.2;
}

.hero h1{
font-size:clamp(36px, 10vw, 110px);
letter-spacing:-0.05em;
font-weight:700; /* balanced bold */
line-height:1;
word-break:break-word;
}

.light{
font-weight:400;
}

.bold{
font-weight:600; /* reduced from 800 */
}

/* FOR SALE gradient */
.sale{
background:linear-gradient(90deg,#ffffff,#0d0d0d,#ffffff);
background-size:200% auto;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 6s ease infinite;
letter-spacing:2px;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:200% 50%;}
}

/* TAGLINE */
.tagline{
margin-top:20px;
font-size:clamp(12px, 2.5vw, 18px);
color:#cbd5e1;
line-height:1.5;
padding:0 10px;
}

/* BUTTONS */
.buttons{
margin-top:25px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:10px 20px;
border-radius:50px;
text-decoration:none;
font-size:clamp(12px,2vw,16px);
white-space:nowrap;
transition:0.3s;
}

.whatsapp{
background:#c503e7;
color:white;
}

.buy{
border:1px solid white;
color:white;
}

.buy:hover{
background:white;
color:black;
}

/* MOBILE */
@media(max-width:480px){

body{
padding:15px;
}

.hero h1{
line-height:1.1;
}

.tagline{
font-size:13px;
}

.btn{
width:100%;
text-align:center;
}

}

/* TABLET */
@media(min-width:481px) and (max-width:1024px){
.hero{
max-width:700px;
}
}

/* LARGE SCREEN */
@media(min-width:1400px){
.hero{
max-width:1100px;
}
}
